<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>LUMIÈRE — Boutique de Acessórios</title>
<meta property="og:title" content="LUMIÈRE — Boutique de Acessórios">
<meta property="og:description" content="Acessórios selecionados com critério. Cada peça é única. Aceda ao catálogo exclusivo.">
<meta property="og:type" content="website">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  min-height:100%;
  font-family:'DM Sans',sans-serif;
  background:#07070B;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}

/* Fundo atmosférico animado */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%,rgba(196,154,60,.18),transparent 60%),
    radial-gradient(ellipse 60% 50% at 10% 110%,rgba(196,154,60,.08),transparent 55%),
    radial-gradient(ellipse 70% 60% at 90% 80%,rgba(100,80,40,.07),transparent 55%);
  animation:atm 8s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes atm{
  0%{opacity:.6;}
  100%{opacity:1;}
}

/* CARTÃO */
.cartao{
  width:100%;max-width:360px;
  background:linear-gradient(160deg,#141420 0%,#0C0C14 50%,#18140C 100%);
  border:1px solid rgba(196,154,60,.18);
  position:relative;overflow:hidden;
  animation:aparecer .8s cubic-bezier(.16,1,.3,1) both;
}
@keyframes aparecer{
  from{opacity:0;transform:translateY(32px) scale(.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* Linha de ouro no topo */
.cartao::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(196,154,60,.8),rgba(226,184,90,.9),rgba(196,154,60,.8),transparent);
}
/* Brilho de canto */
.cartao::after{
  content:'';
  position:absolute;top:-80px;right:-80px;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(196,154,60,.12),transparent 70%);
  pointer-events:none;
}

/* TOPO DO CARTÃO */
.cartao-topo{
  padding:36px 28px 24px;
  text-align:center;
  position:relative;
}

/* Logo animada */
.logo-wrap{
  display:inline-flex;flex-direction:column;align-items:center;
  margin-bottom:20px;
}
.logo-svg{
  animation:girar 20s linear infinite;
  display:block;margin:0 auto 14px;
}
@keyframes girar{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
/* Pausa no hover */
.logo-svg:hover{animation-play-state:paused;}

.logo-nome{
  font-family:'Cormorant Garamond',serif;
  font-size:42px;font-weight:300;
  color:#fff;letter-spacing:.32em;line-height:1;
  margin-left:.32em;
}
.logo-acento{color:#E2B85A;}
.logo-sub{
  font-size:8px;letter-spacing:.48em;text-transform:uppercase;
  color:#C49A3C;margin-top:7px;margin-left:.48em;
}

/* Linha decorativa */
.traco{
  display:flex;align-items:center;gap:10px;
  margin:20px 0;
}
.traco-linha{flex:1;height:1px;background:rgba(196,154,60,.2);}
.traco-diamond{
  width:5px;height:5px;background:var(--or,#C49A3C);
  transform:rotate(45deg);flex-shrink:0;opacity:.7;
}

/* Frase */
.cartao-frase{
  font-family:'Cormorant Garamond',serif;
  font-size:17px;font-style:italic;font-weight:300;
  color:rgba(255,255,255,.38);
  line-height:1.65;
  padding:0 8px;
}

/* CORPO */
.cartao-corpo{padding:0 28px;}

/* Pilares — o que oferece */
.pilares{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:1px;background:rgba(255,255,255,.05);
  margin-bottom:24px;
}
.pilar{
  background:#0E0E18;
  padding:14px 8px;text-align:center;
}
.pilar-icone{font-size:18px;margin-bottom:5px;display:block;}
.pilar-txt{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.3);line-height:1.4;}

/* BOTÃO PRINCIPAL */
.btn-catalogo{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:17px;
  background:linear-gradient(135deg,#C49A3C,#E2B85A,#C49A3C);
  background-size:200% 100%;
  color:#07070B;font-size:11px;letter-spacing:.28em;
  text-transform:uppercase;font-weight:700;border:none;
  cursor:pointer;text-decoration:none;
  animation:brilho 3s ease-in-out infinite;
  transition:transform .15s;
  margin-bottom:12px;
}
.btn-catalogo:hover{transform:scale(1.02);}
.btn-catalogo:active{transform:scale(.98);}
@keyframes brilho{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* BOTÃO WPP */
.btn-wpp{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:13px;
  background:transparent;
  color:rgba(255,255,255,.4);
  font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  border:1px solid rgba(255,255,255,.08);
  cursor:pointer;text-decoration:none;
  transition:all .2s;
  margin-bottom:24px;
}
.btn-wpp:hover{border-color:#25D366;color:#25D366;}

/* RODAPÉ do cartão */
.cartao-rodape{
  border-top:1px solid rgba(196,154,60,.1);
  padding:16px 28px;
  display:flex;align-items:center;justify-content:space-between;
}
.rodape-txt{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.15);}
.rodape-dot{width:4px;height:4px;border-radius:50%;background:rgba(196,154,60,.3);}

/* Partículas decorativas */
.particula{
  position:absolute;border-radius:50%;
  background:rgba(196,154,60,.15);
  animation:flutuar linear infinite;
  pointer-events:none;
}
@keyframes flutuar{
  0%{transform:translateY(100px) scale(0);opacity:0;}
  10%{opacity:1;}
  90%{opacity:.3;}
  100%{transform:translateY(-300px) scale(1);opacity:0;}
}

/* Pulsação no CTA */
.btn-catalogo::after{
  content:'';position:absolute;
  inset:-2px;
  background:linear-gradient(135deg,rgba(196,154,60,.4),transparent,rgba(226,184,90,.3));
  opacity:0;
  animation:pulse-cta 2s ease-in-out infinite;
  pointer-events:none;
}
@keyframes pulse-cta{
  0%,100%{opacity:0;}
  50%{opacity:1;}
}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:#07070B;color:#fff;
  padding:11px 18px;font-size:12px;
  border-left:2px solid #C49A3C;
  opacity:0;transition:all .24s;z-index:999;
  white-space:nowrap;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Responsivo */
@media(max-width:380px){
  .logo-nome{font-size:36px;}
  .cartao-topo{padding:28px 20px 18px;}
  .cartao-corpo{padding:0 20px;}
  .cartao-rodape{padding:14px 20px;}
}
</style>
</head>
<body>

<div class="cartao" id="cartao">

  <!-- Partículas -->

  <div class="particula" style="width:3px;height:3px;left:70%;animation-duration:11s;animation-delay:2s;"></div>

  <div class="cartao-topo">

        <circle cx="60" cy="60" r="28" stroke="#C49A3C" stroke-width=".5" fill="none" opacity=".25"/>

      <div class="logo-nome">LUMI<span class="logo-acento">È</span>RE</div>

</div>

<script>
// ── CONFIGURAR AQUI ──
var numeroWpp = '5511972886167'; // Coloque o seu número
var linkCatalogo = 'lumiere.html'; // Ou o URL real após hospedar

// Abrir WhatsApp
function abrirWpp(e){
  e.preventDefault();
  var msg = 'Olá! Vi o cartão da *LUMIÈRE* e quero conhecer o catálogo de acessórios. Pode me mostrar o que tem disponível? 💛';
  var url = 'https://wa.me/?text='+encodeURIComponent(msg);
  try{window.open(url,'_blank');}catch(ex){window.location.href=url;}
}

// Toast
var tT;
function showToast(m){
  var el=document.getElementById('toast');
  el.textContent=m;el.classList.add('show');
  clearTimeout(tT);tT=setTimeout(function(){el.classList.remove('show');},2600);
}

// Adicionar partículas extras dinamicamente
setTimeout(function(){
  for(var i=0;i<4;i++){
    var p=document.createElement('div');
    p.className='particula';
    p.style.cssText='width:'+(2+Math.random()*4)+'px;height:'+(2+Math.random()*4)+'px;left:'+(Math.random()*90+5)+'%;animation-duration:'+(8+Math.random()*8)+'s;animation-delay:'+Math.random()*5+'s;';

},100);
</script>
</body>
</html>
